name: 'brazzers'
sceneByURL:
  - action: scrapeXPath
    url:
      - brazzers.com/video
      - brazzers.com/scenes
    scraper: sceneScraper
xPathScrapers:
  sceneScraper:
    scene:
      Title: //h2[contains(@class, "sc-1b6bgon")]/text()
      Studio:
        Name: 
          selector: //a[@class="vdkjux-5 gIliaY"]/text()
# Remove '#' if you want get the studio without space.
#          postProcess:
#              - replace: 
#                  - regex: " "
#                    with: ""
      Date:
        selector: //div[contains(@class, "sc-1b6bgon") and contains(text(), ",")]/text()
        postProcess:
            - parseDate: January 2, 2006
      Details: //div[@class="xz1bz0-0 fQiYnf"]/p/text()
      Tags:
        Name: //div[@class="vdkjux-1 cepogm"]/a/text()
      Performers:
        # Name: //div[@class="sc-1b6bgon-2 jywgHS"]/span/a/text()
        Name: //a[contains(@href, "pornstar") and contains(@class, "sc-1b6bgon")]/text()
      Image:
        selector: //img[@class="tg5e7m-1 lSdde"]/@src

